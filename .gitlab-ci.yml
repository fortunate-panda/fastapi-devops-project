stages:
  - analyze
  - build
  - deploy

# 1. CI: Code Analysis
sonarqube-check:
  stage: analyze
  image: sonarsource/sonar-scanner-cli:latest
  script: 
    - sonar-scanner -Dsonar.projectKey=python-fastapi -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN

# 2. CD Part A: Build & Push to Docker Hub
build-and-push:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin
    - docker build -t $DOCKER_USERNAME/fastapi-app:latest .
    - docker push $DOCKER_USERNAME/fastapi-app:latest

# 3. CD Part B: Deploy to AWS EC2
deploy-to-aws:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 $SSH_PRIVATE_KEY
    - ssh-add $SSH_PRIVATE_KEY
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $EC2_IPADDRESS >> ~/.ssh/known_hosts
  script:
    - ssh ubuntu@$EC2_IPADDRESS "
        docker login -u $DOCKER_USERNAME -p $DOCKER_TOKEN &&
        docker stop my-app || true &&
        docker rm my-app || true &&
        docker pull $DOCKER_USERNAME/fastapi-app:latest &&
        docker run -d --name my-app -p 80:80 $DOCKER_USERNAME/fastapi-app:latest
      "